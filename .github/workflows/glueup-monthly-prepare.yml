name: Glue Up Prepare

on:
  workflow_dispatch:
    inputs:
      event:
        description: Event index to prepare (counter unique across the year).
        required: true
        default: "6"
      year:
        description: Year of the event. Defaults to the current UTC year.
        required: false
        default: ""

jobs:
  prepare:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Write Google credentials
        env:
          GOOGLE_CREDENTIALS_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
        run: |
          if [ -z "$GOOGLE_CREDENTIALS_JSON" ]; then
            echo "GOOGLE_SERVICE_ACCOUNT_JSON secret is missing."
            exit 1
          fi
          mkdir -p credentials
          printf '%s' "$GOOGLE_CREDENTIALS_JSON" > credentials/google-service-account.json

      - name: Install dependencies
        run: npm ci
        working-directory: glueup
        env:
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: "1"

      - name: Check
        run: npm run check
        working-directory: glueup

      - name: Resolve event
        id: event
        env:
          INPUT_EVENT: ${{ github.event.inputs.event }}
          INPUT_YEAR: ${{ github.event.inputs.year }}
        run: |
          EVENT="$INPUT_EVENT"
          YEAR="$INPUT_YEAR"
          if [ -z "$YEAR" ]; then
            YEAR="$(date -u +%Y)"
          fi
          SLUG="evt-${YEAR}-$(printf '%03d' "$EVENT")"
          {
            echo "event=$EVENT"
            echo "year=$YEAR"
            echo "slug=$SLUG"
          } >> "$GITHUB_OUTPUT"

      - name: Prepare event run
        working-directory: glueup
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ../credentials/google-service-account.json
          GLUEUP_EVENTS_FOLDER_ID: ${{ vars.GLUEUP_EVENTS_FOLDER_ID || '1rhIJFpQASAzxso02Gu1tvnMxXlyFiuFE' }}
          TIMEZONE: America/New_York
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          EVENT: ${{ steps.event.outputs.event }}
          YEAR: ${{ steps.event.outputs.year }}
        run: npm run monthly-prepare -- --event "$EVENT" --year "$YEAR"

      - name: Upload run artifacts
        uses: actions/upload-artifact@v4
        with:
          name: glueup-run-${{ steps.event.outputs.slug }}
          path: glueup/runs/
